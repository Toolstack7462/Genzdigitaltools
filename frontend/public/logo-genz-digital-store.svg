<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96" role="img" aria-label="Gen Z Digital Store">
  <title>Gen Z Digital Store</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04335A"/>
      <stop offset="1" stop-color="#00091E"/>
    </linearGradient>
    <linearGradient id="z" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#7DF9FF"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#00C9DD" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#008EA3" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00AFC1"/>
      <stop offset="0.5" stop-color="#7DF9FF"/>
      <stop offset="1" stop-color="#00AFC1"/>
    </linearGradient>
  </defs>

  <!-- Icon mark -->
  <g transform="translate(24 24)">
    <rect x="0.75" y="0.75" width="46.5" height="46.5" rx="13.5" fill="url(#tile)" stroke="url(#edge)" stroke-width="1.5"/>
    <rect x="2.5" y="2.5" width="43" height="20" rx="11" fill="#FFFFFF" opacity="0.05"/>
    <path d="M15 16 H33 L16 32 H34" fill="none" stroke="url(#z)" stroke-width="4.4" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 11 L37.1 14.1 L40.2 15.2 L37.1 16.3 L36 19.4 L34.9 16.3 L31.8 15.2 L34.9 14.1 Z" fill="#7DF9FF"/>
  </g>

  <!-- Wordmark -->
  <text x="90" y="58" font-family="'Space Grotesk', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="30" letter-spacing="-0.5">
    <tspan fill="#FFFFFF">Gen Z </tspan><tspan fill="url(#word)">Digital Store</tspan>
  </text>
</svg>
