<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Access expired — Gen Z Digital Store</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1f2a4d 0%, #0c1020 60%, #070a14 100%);
      color: #e7ecf5;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 440px;
      background: rgba(18, 23, 41, 0.92);
      border: 1px solid rgba(255, 140, 0, 0.25);
      border-radius: 18px;
      padding: 36px 32px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      text-align: center;
    }
    .badge {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(255, 140, 0, 0.12);
      border: 1px solid rgba(255, 140, 0, 0.4);
      font-size: 30px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
    .tool { color: #ff9f43; font-weight: 600; }
    p { color: rgba(231, 236, 245, 0.72); font-size: 15px; line-height: 1.55; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(135deg, #ff8c00 0%, #ff6b00 100%);
      color: #1a1205;
      font-weight: 700;
      font-size: 15px;
      padding: 13px 26px;
      border-radius: 12px;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255, 140, 0, 0.35); }
    .foot { margin-top: 22px; font-size: 12px; color: rgba(231, 236, 245, 0.4); }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge" aria-hidden="true">⏳</div>
    <h1>Your access has expired</h1>
    <p id="message">Your access to <span class="tool" id="tool-name">this tool</span> has expired or been removed. Please renew your plan to continue.</p>
    <a class="btn" id="renew" href="https://app.genzdigitalstore.com/client" target="_top" rel="noopener">Renew your plan</a>
    <div class="foot">Gen Z Digital Store · Secure access</div>
  </main>
  <script src="js/expired.js"></script>
</body>
</html>
